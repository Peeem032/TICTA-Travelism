services:
  db:
    image: mongo
    env_file:
      - "./.env"
    volumes:
      - scraping_db:/data/db
    ports:
      - "27017:27017"
    restart: unless-stopped
    networks:
      - mongo_network
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  metadata_scraping_app:
    build:
      context: ./metadata-scraping-agent
      dockerfile: Dockerfile.dev
    env_file:
      - "./metadata-scraping-agent/.env"
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: db
      DB_PORT: 27017
      DB_NAME: scraping_db
    ports:
      - "3000:3000"
    volumes:
      - "./metadata-scraping-agent:/app"
      - "/app/node_modules"
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - mongo_network

  mongo-express:
    image: mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: "mongodb://db:27017"
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - mongo_network

volumes:
  scraping_db:
networks:
  mongo_network:
    driver: bridge